[build]
  command = "rm -rf _flutter && git clone https://github.com/flutter/flutter.git -b stable _flutter && _flutter/bin/flutter config --enable-web && _flutter/bin/flutter build web --release"
  publish = "build/web"

[build.environment]
  FLUTTER_CHANNEL = "stable"

# 1. Redirect Root (/) to External Landing Page
# This ensures direct visits to the app bypass go to the marketing site.
[[redirects]]
  from = "/"
  to = "https://sofa2sluggerland.netlify.app/"
  status = 301
  force = true

# 2. SPA Fallback
# Any other path (e.g. /gym, /splash) is rewritten to index.html so Flutter can handle it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
