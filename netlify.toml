[build]
  command = "rm -rf _flutter && git clone https://github.com/flutter/flutter.git -b stable _flutter && _flutter/bin/flutter config --enable-web && _flutter/bin/flutter build web --release"
  publish = "build/web"
  functions = "netlify/functions"

[build.environment]
  FLUTTER_CHANNEL = "stable"
  # STRIPE_SECRET_KEY should be set in Netlify Dashboard > Site Settings > Environment Variables
  # Test key: sk_test_... (from Stripe Dashboard)
  # Live key: sk_live_... (from Stripe Dashboard)

# 1. SPA Fallback
# Any other path (e.g. /gym, /splash) is rewritten to index.html so Flutter can handle it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


